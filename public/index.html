<!-- public/index.html -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redireccionando...</title>

    <!-- Meta refresh tag to redirect automatically -->
    <meta http-equiv="refresh" content="0; URL='/es'" />

    <!-- JavaScript-based redirect for extra support -->
    <script type="text/javascript">
      // In case the meta refresh doesn't work, use JavaScript as a fallback
      window.location.href = "/es";
    </script>
  </head>
  <body>
    <p>Si no es redirigido automaticamente, <a href="/es">haga click aqui</a>.</p>
  </body>
</html>
